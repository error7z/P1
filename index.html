<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P7M ULTRA | INFINITY MATRIX</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=Space+Mono&display=swap" rel="stylesheet">
    <style>
        :root { --rb: linear-gradient(45deg, #ff0000, #ff7300, #fffb00, #48ff00, #00ffd5, #002bff, #7a00ff, #ff00c8, #ff0000); }
        body { background: #020305; color: #e2e8f0; font-family: 'Plus Jakarta Sans', sans-serif; font-size: 11px; }
        .border-panel { border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 15px; background: rgba(10,12,18,0.5); }
        .premium-border { position: relative; padding: 1px; background: var(--rb); background-size: 400%; border-radius: 13px; animation: flow 20s linear infinite; }
        @keyframes flow { 0% { background-position: 0% 50%; } 100% { background-position: 100% 50%; } }
        .glass { backdrop-filter: blur(40px); background: rgba(15,17,26,0.95); }
        .input-p7m { background: #080a0f; border: 1px solid #1e293b; color: #fff; padding: 10px; border-radius: 8px; width: 100%; outline: none; transition: 0.3s; }
        .input-p7m:focus { border-color: #3b82f6; box-shadow: 0 0 10px rgba(59,130,246,0.3); }
        .floating-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; z-index: 100; }
        .analysis-card { border-left: 4px solid; padding: 10px; margin-bottom: 8px; background: rgba(255,255,255,0.03); }
        .attach-badge { background: #1e293b; border: 1px solid #3b82f6; padding: 5px 10px; border-radius: 6px; display: flex; align-items: center; gap: 8px; font-weight: bold; }
        .custom-scroll::-webkit-scrollbar { width: 3px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="p-4">

    <div id="settings-modal" class="floating-modal" onclick="this.style.display='none'">
        <div class="glass border-panel w-[600px] p-6 space-y-4" onclick="event.stopPropagation()">
            <div class="flex justify-between border-b border-white/10 pb-2">
                <h2 id="modal-title" class="text-blue-400 font-black uppercase text-xs">Settings Configuration</h2>
                <button onclick="$('settings-modal').style.display='none'" class="text-zinc-500">✕</button>
            </div>
            <textarea id="modal-input" class="input-p7m h-48 font-mono"></textarea>
            <button onclick="saveModalData()" class="w-full bg-blue-600 py-3 rounded font-black uppercase text-xs">Lock Data</button>
        </div>
    </div>

    <div id="identity-modal" class="floating-modal" onclick="this.style.display='none'">
        <div class="glass border-panel w-[700px] p-6 space-y-4" onclick="event.stopPropagation()">
            <h2 class="text-purple-400 font-black uppercase text-xs border-b border-white/10 pb-2">Global Identity Settings</h2>
            <div class="grid grid-cols-2 gap-4">
                <div class="space-y-1"><div class="flex justify-between"><label>USER-AGENT</label><input type="checkbox" id="auto-ua" checked></div><input type="text" id="h-ua" class="input-p7m"></div>
                <div class="space-y-1"><div class="flex justify-between"><label>MESSAGE-ID</label><input type="checkbox" id="auto-mid" checked></div><input type="text" id="h-mid" class="input-p7m"></div>
                <div class="space-y-1"><div class="flex justify-between"><label>GMAIL-THREAD</label><input type="checkbox" id="auto-tid" checked></div><input type="text" id="h-tid" class="input-p7m"></div>
                <div class="space-y-1"><div class="flex justify-between"><label>X-MAILER</label><input type="checkbox" id="auto-mailer" checked></div><input type="text" id="h-mailer" class="input-p7m" value="Microsoft Outlook 16.0"></div>
                <div class="space-y-1"><label>X-PRIORITY</label><input type="text" id="h-priority" class="input-p7m" value="1 (Highest)"></div>
            </div>
            <button onclick="$('identity-modal').style.display='none'" class="w-full bg-purple-600 py-3 rounded font-black uppercase text-xs">Save Matrix</button>
        </div>
    </div>

    <div class="max-w-[1900px] mx-auto grid grid-cols-12 gap-4">
        
        <div class="col-span-3 space-y-4">
            <h1 class="text-2xl font-black italic">P7M <span class="text-blue-500">ULTRA</span></h1>
            <button onclick="$('identity-modal').style.display='flex'" class="w-full bg-zinc-800 border border-white/10 py-3 rounded-xl text-[10px] font-black uppercase hover:bg-purple-600 transition">⚙️ Global Identity Setting</button>

            <div class="premium-border">
                <div class="border-panel glass space-y-3">
                    <p class="text-[10px] font-black text-blue-400 uppercase">Proxy Tunneling (Server-Side)</p>
                    <div class="grid grid-cols-2 gap-2">
                        <input type="text" id="px-host" placeholder="Host" class="input-p7m save-data">
                        <input type="text" id="px-port" placeholder="Port" class="input-p7m save-data">
                        <input type="text" id="px-user" placeholder="User" class="input-p7m save-data">
                        <input type="password" id="px-pass" placeholder="Pass" class="input-p7m save-data">
                    </div>
                </div>
            </div>

            <div class="border-panel space-y-3">
                <p class="text-[10px] font-black text-orange-400 uppercase">Blast Strategy</p>
                <div class="space-y-2">
                    <select id="strategy" class="input-p7m save-data" onchange="toggleBatch()">
                        <option value="1-by-1">1-BY-1 (Sequential)</option>
                        <option value="random">Random (Chaos Mode)</option>
                        <option value="continuous">Continuously Send (Batch)</option>
                    </select>
                    <div id="batch-container" class="hidden flex justify-between items-center bg-zinc-900 p-2 rounded">
                        <label class="text-[10px]">Jump after</label><input type="number" id="smtp-jump" value="5" class="input-p7m !w-16">
                    </div>
                    <div class="flex justify-between items-center"><label class="text-[10px]">Delay = (ms)</label><input type="number" id="send-delay" value="3000" class="input-p7m !w-20 save-data"></div>
                </div>
            </div>

            <div class="border-panel border-b-4 border-blue-500 text-center">
                <div class="grid grid-cols-2 gap-2 mb-4">
                    <div class="bg-zinc-900 p-4 rounded-xl"><span class="text-[9px] text-zinc-500">Passed</span><p id="stat-sent" class="text-3xl font-black text-green-500">0</p></div>
                    <div class="bg-zinc-900 p-4 rounded-xl"><span class="text-[9px] text-zinc-500">Failed</span><p id="stat-fail" class="text-3xl font-black text-red-500">0</p></div>
                </div>
                <button onclick="startBlast()" id="btn-start" class="w-full bg-blue-600 py-4 rounded-xl font-black uppercase text-xs tracking-widest">Execute Infinity Blast</button>
                <button onclick="stopBlast()" id="btn-stop" class="w-full bg-red-600 py-4 rounded-xl font-black uppercase text-xs hidden">Emergency Stop</button>
            </div>
        </div>

        <div class="col-span-6 space-y-4">
            <div class="grid grid-cols-2 gap-4">
                <div class="border-panel">
                    <div class="flex justify-between items-center mb-1"><span class="text-blue-400 font-bold uppercase">SMTP</span><input type="file" id="f-smtp" class="text-[10px] w-24"></div>
                    <p id="name-smtp" class="text-[9px] text-zinc-500 italic truncate">No file selected</p>
                </div>
                <div class="border-panel">
                    <div class="flex justify-between items-center mb-1"><span class="text-green-400 font-bold uppercase">Targets</span><input type="file" id="f-target" class="text-[10px] w-24"></div>
                    <p id="name-target" class="text-[9px] text-zinc-500 italic truncate">No file selected</p>
                </div>
            </div>

            <div class="premium-border">
                <div class="border-panel glass space-y-4">
                    <div class="grid grid-cols-2 gap-4">
                        <div class="relative"><input type="text" id="s-name" placeholder="Sender Name" class="input-p7m save-data"><button onclick="openSettings('sender')" class="absolute right-2 top-2">⚙️</button></div>
                        <div class="relative"><input type="text" id="s-sub" placeholder="Subject" class="input-p7m save-data"><button onclick="openSettings('subject')" class="absolute right-2 top-2">⚙️</button></div>
                    </div>

                    <div class="bg-blue-600/5 p-4 rounded-xl space-y-3">
                        <div class="flex gap-2">
                            <input type="text" id="redir-url" placeholder="Redirect Link" class="input-p7m save-data">
                            <select id="encoding" class="input-p7m !w-32 save-data" onchange="updatePreview()">
                                <option value="7bit">Plain HTML</option><option value="base64">Base64</option>
                            </select>
                        </div>
                        <div class="flex gap-2 items-center">
                            <div class="relative"><button class="bg-zinc-800 px-4 py-2 rounded text-[10px] font-bold border border-white/10">ADD ATTACHMENT</button><input type="file" id="f-attach" multiple class="opacity-0 absolute inset-0 cursor-pointer"></div>
                            <div id="attach-preview" class="flex gap-2 flex-wrap"></div>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <textarea id="s-body" oninput="updatePreview()" class="input-p7m h-[380px] font-mono text-[10px] save-data" placeholder="Inject HTML Source..."></textarea>
                        <div class="bg-white rounded-lg overflow-hidden h-[380px]"><iframe id="p-frame" class="w-full h-full border-0"></iframe></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-span-3">
            <div class="border-panel h-full flex flex-col glass overflow-hidden">
                <p class="text-[10px] font-black uppercase text-zinc-500 border-b border-white/10 pb-2 mb-2">Multi-Color Analysis Monitor</p>
                <div id="analysis-box" class="flex-grow overflow-y-auto custom-scroll space-y-2"></div>
            </div>
        </div>
    </div>

    <script>
        let smtps = [], targets = [], attachments = [], isRunning = false;
        const $ = (id) => document.getElementById(id);

        function toggleBatch() { $('batch-container').style.display = ($('strategy').value === 'continuous') ? 'flex' : 'none'; }
        
        function addAnalysis(type, msg, color) {
            const div = document.createElement('div');
            div.className = "analysis-card text-[9px] border-" + color + "-500";
            div.style.borderColor = color;
            div.innerHTML = `<div class="flex justify-between font-black uppercase mb-1"><span>${type}</span><span class="opacity-40">${new Date().toLocaleTimeString()}</span></div><div class="font-mono text-zinc-400">${msg}</div>`;
            $('analysis-box').prepend(div);
        }

        // --- File Tracking ---
        $('f-smtp').onchange = e => {
            $('name-smtp').innerText = e.target.files[0].name;
            parseCSV(e, 'smtp');
        };
        $('f-target').onchange = e => {
            $('name-target').innerText = e.target.files[0].name;
            parseCSV(e, 'target');
        };

        // --- Instant Attachment Preview ---
        $('f-attach').onchange = (e) => {
            attachments = [];
            $('attach-preview').innerHTML = '';
            Array.from(e.target.files).forEach(f => {
                const reader = new FileReader();
                reader.onload = () => {
                    attachments.push({ filename: f.name, content: reader.result.split(',')[1], encoding: 'base64' });
                    $('attach-preview').innerHTML += `<div class="attach-badge">📎 ${f.name}</div>`;
                    addAnalysis("ATTACH", `File Uploaded: ${f.name}`, "#3b82f6");
                };
                reader.readAsDataURL(f);
            });
        };

        async function startBlast() {
            if(!smtps.length || !targets.length) return alert("DATA MISSING");
            isRunning = true;
            $('btn-start').classList.add('hidden'); $('btn-stop').classList.remove('hidden');
            addAnalysis("START", "Multi-Color Engine Initialized", "#f97316");

            for(let i=0; i < targets.length; i++) {
                if(!isRunning) break;

                addAnalysis("HANDSHAKE", `Attempting Proxy Tunnel -> ${$('px-host').value}`, "#a855f7");

                const payload = {
                    smtp: { user: smtps[i % smtps.length][0], pass: smtps[i % smtps.length][1] },
                    proxy: { host: $('px-host').value, port: $('px-port').value, user: $('px-user').value, pass: $('px-pass').value },
                    mail: { to: targets[i][0], fromName: $('s-name').value, subject: $('s-sub').value, html: $('s-body').value },
                    headers: { userAgent: "Mozilla/5.0...", priority: "1", mailer: "Outlook 16.0" },
                    encoding: $('encoding').value,
                    attachments
                };

                try {
                    const res = await fetch('/api/send', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(payload) });
                    const r = await res.json();
                    if(r.success) {
                        $('stat-sent').innerText = parseInt($('stat-sent').innerText)+1;
                        addAnalysis("SUCCESS", `Sent to: ${targets[i][0]} (SMTP Index: ${i % smtps.length})`, "#22c55e");
                    } else throw r;
                } catch (e) {
                    $('stat-fail').innerText = parseInt($('stat-fail').innerText)+1;
                    addAnalysis("FAILED", `Error: ${e.error || e.message} | Code: ${e.code || 'NULL'}`, "#ef4444");
                }
                await new Promise(r => setTimeout(r, parseInt($('send-delay').value)));
            }
            stopBlast();
        }

        function stopBlast() { 
            isRunning = false; 
            $('btn-start').classList.remove('hidden'); 
            $('btn-stop').classList.add('hidden'); 
            addAnalysis("STOP", "Engine Halted Manually", "#ef4444");
        }

        function parseCSV(e, type) {
            Papa.parse(e.target.files[0], { skipEmptyLines: true, complete: r => {
                const data = r.data.filter(x => x.length > 0);
                if(type === 'smtp') { smtps = data; $('count-smtp').innerText = data.length; }
                else { targets = data; $('count-target').innerText = data.length; }
                addAnalysis("UPLOAD", `Matrix Loaded: ${data.length} records`, "#22c55e");
            }});
        }

        function updatePreview() {
            $('p-frame').srcdoc = `<html><body>${$('s-body').value}</body></html>`;
        }
    </script>
</body>
</html>
