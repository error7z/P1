<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P7M ULTRA | INFINITY MATRIX</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=Space+Mono&display=swap" rel="stylesheet">
    <style>
        :root { --rb: linear-gradient(45deg, #ff0000, #ff7300, #fffb00, #48ff00, #00ffd5, #002bff, #7a00ff, #ff00c8, #ff0000); }
        body { background: #020305; color: #e2e8f0; font-family: 'Plus Jakarta Sans', sans-serif; font-size: 11px; }
        .border-panel { border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 15px; background: rgba(10,12,18,0.5); }
        .premium-border { position: relative; padding: 1px; background: var(--rb); background-size: 400%; border-radius: 13px; animation: flow 20s linear infinite; }
        @keyframes flow { 0% { background-position: 0% 50%; } 100% { background-position: 100% 50%; } }
        .glass { backdrop-filter: blur(40px); background: rgba(15,17,26,0.95); }
        .input-p7m { background: #080a0f; border: 1px solid #1e293b; color: #fff; padding: 10px; border-radius: 8px; width: 100%; outline: none; transition: 0.3s; }
        .input-p7m:focus { border-color: #3b82f6; box-shadow: 0 0 10px rgba(59,130,246,0.3); }
        .floating-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; z-index: 100; }
        .debug-log { font-family: 'Space Mono', monospace; font-size: 10px; }
        .analysis-card { border-left: 4px solid; padding-left: 10px; margin-bottom: 5px; animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(10px); } to { opacity: 1; transform: translateX(0); } }
        .ai-glow { box-shadow: 0 0 15px rgba(147, 51, 234, 0.5); border-color: #9333ea !important; }
    </style>
</head>
<body class="p-4">

    <div id="settings-modal" class="floating-modal" onclick="this.style.display='none'">
        <div class="glass border-panel w-[600px] p-6 space-y-4" onclick="event.stopPropagation()">
            <div class="flex justify-between border-b border-white/10 pb-2">
                <h2 id="modal-title" class="text-blue-400 font-black uppercase text-xs">Settings Configuration</h2>
                <button onclick="$('settings-modal').style.display='none'" class="text-zinc-500">✕</button>
            </div>
            <div id="modal-body" class="space-y-4">
                <textarea id="modal-input" class="input-p7m h-48 font-mono" placeholder="Input strings (one per line)..."></textarea>
                <div class="flex items-center gap-4">
                    <span class="text-[10px] text-zinc-500 font-bold uppercase">Load External (.txt / .csv)</span>
                    <input type="file" id="modal-file" accept=".txt,.csv" class="text-[10px]">
                </div>
            </div>
            <button onclick="saveModalData()" class="w-full bg-blue-600 py-3 rounded font-black uppercase text-xs">Lock Data</button>
        </div>
    </div>

    <div id="identity-modal" class="floating-modal" onclick="this.style.display='none'">
        <div class="glass border-panel w-[700px] p-6 space-y-4" onclick="event.stopPropagation()">
            <h2 class="text-purple-400 font-black uppercase text-xs border-b border-white/10 pb-2">Global Identity Settings</h2>
            <div class="grid grid-cols-2 gap-4 max-h-[400px] overflow-y-auto pr-2 custom-scroll">
                <div class="space-y-1">
                    <div class="flex justify-between"><label>USER-AGENT</label><input type="checkbox" id="auto-ua" checked></div>
                    <input type="text" id="h-ua" class="input-p7m" placeholder="Mozilla/5.0...">
                </div>
                <div class="space-y-1">
                    <div class="flex justify-between"><label>MESSAGE-ID</label><input type="checkbox" id="auto-mid" checked></div>
                    <input type="text" id="h-mid" class="input-p7m">
                </div>
                <div class="space-y-1">
                    <div class="flex justify-between"><label>GMAIL-THREAD</label><input type="checkbox" id="auto-tid" checked></div>
                    <input type="text" id="h-tid" class="input-p7m">
                </div>
                <div class="space-y-1">
                    <div class="flex justify-between"><label>X-MAILER</label><input type="checkbox" id="auto-mailer" checked></div>
                    <input type="text" id="h-mailer" class="input-p7m" value="Microsoft Outlook 16.0">
                </div>
                <div class="space-y-1">
                    <label>X-PRIORITY</label>
                    <input type="text" id="h-priority" class="input-p7m" value="1 (Highest)">
                </div>
                <div class="space-y-1">
                    <label>X-MS-PRIORITY</label>
                    <input type="text" id="h-mspriority" class="input-p7m" value="High">
                </div>
            </div>
            <button onclick="$('identity-modal').style.display='none'" class="w-full bg-purple-600 py-3 rounded font-black uppercase text-xs">Save Matrix</button>
        </div>
    </div>

    <div class="max-w-[1900px] mx-auto grid grid-cols-12 gap-4">
        
        <div class="col-span-3 space-y-4">
            <div class="space-y-2">
                <h1 class="text-2xl font-black italic">P7M <span class="text-blue-500">ULTRA</span></h1>
                <button onclick="$('identity-modal').style.display='flex'" class="w-full bg-zinc-800 border border-white/10 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest hover:bg-purple-600 transition">⚙️ Global Identity Setting</button>
            </div>

            <div class="premium-border">
                <div class="border-panel glass space-y-3">
                    <p class="text-[10px] font-black text-blue-400 uppercase">Proxy Tunneling</p>
                    <div class="grid grid-cols-2 gap-2">
                        <input type="text" id="px-host" placeholder="Host" class="input-p7m save-data">
                        <input type="text" id="px-port" placeholder="Port" class="input-p7m save-data">
                        <input type="text" id="px-user" placeholder="User" class="input-p7m save-data">
                        <input type="password" id="px-pass" placeholder="Pass" class="input-p7m save-data">
                    </div>
                    <button onclick="checkIP()" class="w-full bg-blue-600/20 text-blue-400 py-2 rounded text-[10px] font-bold uppercase">Test Proxy Signal</button>
                    <div id="ip-status" class="bg-black/40 p-2 rounded text-[9px] font-mono min-h-[50px]">Ready...</div>
                </div>
            </div>

            <div class="border-panel space-y-3">
                <p class="text-[10px] font-black text-orange-400 uppercase">Blast Strategy</p>
                <div class="space-y-2">
                    <select id="strategy" class="input-p7m save-data" onchange="toggleBatch()">
                        <option value="1-by-1">1-BY-1 (Sequential)</option>
                        <option value="random">Random (Chaos Mode)</option>
                        <option value="continuous">Continuously Send (Batch)</option>
                    </select>
                    <div id="batch-container" class="hidden flex justify-between items-center bg-zinc-900 p-2 rounded">
                        <label class="text-[10px]">Jump after</label>
                        <input type="number" id="smtp-jump" value="5" class="input-p7m !w-16">
                    </div>
                    <div class="flex justify-between items-center">
                        <label class="text-[10px]">Delay = (ms)</label>
                        <input type="number" id="send-delay" value="3000" class="input-p7m !w-20 save-data">
                    </div>
                </div>
            </div>

            <div class="border-panel border-b-4 border-blue-500 text-center">
                <div class="grid grid-cols-2 gap-2 mb-4">
                    <div class="bg-zinc-900 p-4 rounded-xl"><span class="text-[9px] text-zinc-500 uppercase">Passed</span><p id="stat-sent" class="text-3xl font-black text-green-500">0</p></div>
                    <div class="bg-zinc-900 p-4 rounded-xl"><span class="text-[9px] text-zinc-500 uppercase">Failed</span><p id="stat-fail" class="text-3xl font-black text-red-500">0</p></div>
                </div>
                <button onclick="startBlast()" id="btn-start" class="w-full bg-blue-600 py-4 rounded-xl font-black uppercase text-xs tracking-widest">Execute Infinity Blast</button>
                <button onclick="stopBlast()" id="btn-stop" class="w-full bg-red-600 py-4 rounded-xl font-black uppercase text-xs hidden">Emergency Stop</button>
            </div>
        </div>

        <div class="col-span-6 space-y-4">
            <div class="grid grid-cols-2 gap-4">
                <div class="border-panel flex justify-between items-center">
                    <span class="text-blue-400 font-bold uppercase">SMTP (<b id="count-smtp">0</b>)</span>
                    <input type="file" id="f-smtp" class="text-[10px] w-24">
                </div>
                <div class="border-panel flex justify-between items-center">
                    <span class="text-green-400 font-bold uppercase">Targets (<b id="count-target">0</b>)</span>
                    <input type="file" id="f-target" class="text-[10px] w-24">
                </div>
            </div>

            <div class="premium-border">
                <div class="border-panel glass space-y-4">
                    <div class="grid grid-cols-2 gap-4">
                        <div class="space-y-1">
                            <div class="flex justify-between items-center">
                                <label class="text-[9px] font-bold">Infinite AI</label>
                                <input type="checkbox" id="ai-sender" class="save-data">
                            </div>
                            <div class="relative">
                                <input type="text" id="s-name" placeholder="Sender Name" class="input-p7m save-data">
                                <button onclick="openSettings('sender')" class="absolute right-2 top-2">⚙️</button>
                            </div>
                        </div>
                        <div class="space-y-1">
                            <div class="flex justify-between items-center">
                                <label class="text-[9px] font-bold">Infinite AI</label>
                                <input type="checkbox" id="ai-subject" class="save-data">
                            </div>
                            <div class="relative">
                                <input type="text" id="s-sub" placeholder="Subject" class="input-p7m save-data">
                                <button onclick="openSettings('subject')" class="absolute right-2 top-2">⚙️</button>
                            </div>
                        </div>
                    </div>

                    <div class="bg-blue-600/5 p-4 rounded-xl space-y-3">
                        <div class="flex gap-2">
                            <input type="text" id="redir-url" placeholder="Redirect Link" class="input-p7m save-data">
                            <input type="text" id="redir-text" placeholder="Button Text" class="input-p7m save-data">
                            <select id="encoding" class="input-p7m !w-32 save-data" onchange="updatePreview()">
                                <option value="7bit">Plain HTML</option>
                                <option value="base64">Base64</option>
                                <option value="quoted-printable">Quoted-Printable</option>
                            </select>
                        </div>
                        <div class="flex gap-2 items-center">
                            <button class="bg-zinc-800 px-4 py-2 rounded text-[10px] font-bold border border-white/10">ATTACHMENTS +</button>
                            <input type="file" id="f-attach" multiple class="opacity-0 absolute w-24 cursor-pointer">
                            <div id="attach-preview" class="flex gap-1 overflow-x-auto"></div>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div class="relative">
                            <textarea id="s-body" oninput="updatePreview()" class="input-p7m h-[380px] font-mono text-[10px] save-data" placeholder="Inject HTML Source..."></textarea>
                            <button onclick="openSettings('body')" class="absolute right-2 top-2 bg-zinc-900 p-1 rounded">⚙️</button>
                        </div>
                        <div class="bg-white rounded-lg overflow-hidden h-[380px]"><iframe id="p-frame" class="w-full h-full border-0"></iframe></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-span-3">
            <div class="border-panel h-full flex flex-col glass overflow-hidden">
                <div class="flex justify-between items-center mb-4 border-b border-white/10 pb-2">
                    <span class="text-[10px] font-black uppercase text-zinc-500">Multi-Color Analysis</span>
                    <button onclick="$('analysis-box').innerHTML=''" class="text-red-500 font-bold text-[9px]">WIPE</button>
                </div>
                <div id="analysis-box" class="flex-grow overflow-y-auto custom-scroll space-y-2">
                    </div>
            </div>
        </div>
    </div>

    <script>
        let smtps = [], targets = [], attachments = [], isRunning = false, activeSetting = '';
        const $ = (id) => document.getElementById(id);

        function toggleBatch() {
            $('batch-container').style.display = ($('strategy').value === 'continuous') ? 'flex' : 'none';
        }

        function openSettings(type) {
            activeSetting = type;
            $('settings-modal').style.display = 'flex';
            $('modal-title').innerText = `CONFIGURATION: ${type.toUpperCase()} ROTATOR`;
            $('modal-input').value = localStorage.getItem(`list_${type}`) || "";
        }

        function saveModalData() {
            localStorage.setItem(`list_${activeSetting}`, $('modal-input').value);
            $('settings-modal').style.display = 'none';
            addAnalysis(`SYNC`, `${activeSetting.toUpperCase()} MATRIX UPDATED`, "blue");
        }

        function addAnalysis(type, msg, color) {
            const colors = { blue: '#3b82f6', green: '#22c55e', red: '#ef4444', purple: '#a855f7', orange: '#f97316' };
            const div = document.createElement('div');
            div.className = "analysis-card bg-white/5 text-[9px]";
            div.style.borderColor = colors[color];
            div.innerHTML = `
                <div class="flex justify-between text-[8px] opacity-50 mb-1">
                    <span>${new Date().toLocaleTimeString()}</span>
                    <span style="color:${colors[color]}">${type}</span>
                </div>
                <div class="font-mono break-all">${msg}</div>
            `;
            $('analysis-box').prepend(div);
        }

        $('f-smtp').onchange = e => parseCSV(e, 'smtp');
        $('f-target').onchange = e => parseCSV(e, 'target');

        function parseCSV(e, type) {
            Papa.parse(e.target.files[0], { skipEmptyLines: true, complete: r => {
                const data = r.data.filter(x => x.length > 0);
                if(type === 'smtp') { smtps = data; $('count-smtp').innerText = data.length; }
                else { targets = data; $('count-target').innerText = data.length; }
                addAnalysis("LOAD", `${data.length} records in ${type}`, "green");
            }});
        }

        function updatePreview() {
            const btn = `<div style="text-align:center;margin:15px 0;"><a href="${$('redir-url').value}" style="background:#2563eb;color:#ffffff;padding:10px 20px;text-decoration:none;border-radius:5px;font-weight:bold;">${$('redir-text').value}</a></div>`;
            $('p-frame').srcdoc = `<html><body>${$('s-body').value}${btn}</body></html>`;
            saveAll();
        }

        async function startBlast() {
            if(!smtps.length || !targets.length) return alert("DATA MISSING");
            isRunning = true;
            $('btn-start').classList.add('hidden'); $('btn-stop').classList.remove('hidden');

            const senderList = localStorage.getItem('list_sender')?.split('\n').filter(x => x.trim()) || [];
            const subList = localStorage.getItem('list_subject')?.split('\n').filter(x => x.trim()) || [];
            const bodyList = localStorage.getItem('list_body')?.split('\n').filter(x => x.trim()) || [];

            let smtpIdx = 0, batchCount = 0;
            const jumpLimit = parseInt($('smtp-jump').value) || 5;

            for(let i=0; i < targets.length; i++) {
                if(!isRunning) break;

                // SMTP Rotation Logic
                if($('strategy').value === 'continuous' && batchCount >= jumpLimit) {
                    smtpIdx = (smtpIdx + 1) % smtps.length;
                    batchCount = 0;
                    addAnalysis("ROTATE", "Switching to next SMTP node", "purple");
                } else if($('strategy').value === 'random') {
                    smtpIdx = Math.floor(Math.random() * smtps.length);
                }

                // AI Randomization Logic
                const name = ($('ai-sender').checked && senderList.length) ? senderList[Math.floor(Math.random()*senderList.length)] : $('s-name').value;
                const sub = ($('ai-subject').checked && subList.length) ? subList[Math.floor(Math.random()*subList.length)] : $('s-sub').value;
                const body = (bodyList.length) ? bodyList[Math.floor(Math.random()*bodyList.length)] : $('s-body').value;

                const headers = {
                    userAgent: $('auto-ua').checked ? `Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36` : $('h-ua').value,
                    msgId: $('auto-mid').checked ? `<${Math.random().toString(36).substring(2)}@gmail.com>` : $('h-mid').value,
                    threadId: $('auto-tid').checked ? `thread-f:${Date.now()}` : $('h-tid').value,
                    mailer: $('auto-mailer').checked ? 'Microsoft Outlook 16.0' : $('h-mailer').value,
                    entityId: Math.random().toString(36).substring(2, 10),
                    priority: $('h-priority').value,
                    msPriority: $('h-mspriority').value
                };

                const payload = {
                    smtp: { user: smtps[smtpIdx][0], pass: smtps[smtpIdx][1] },
                    proxy: { host: $('px-host').value, port: $('px-port').value, user: $('px-user').value, pass: $('px-pass').value },
                    mail: { to: targets[i][0], fromName: name, subject: sub, html: body },
                    headers,
                    encoding: $('encoding').value
                };

                try {
                    const res = await fetch('/api/send', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(payload) });
                    const r = await res.json();
                    if(r.success) {
                        $('stat-sent').innerText = parseInt($('stat-sent').innerText)+1;
                        addAnalysis("PASS", `Target: ${targets[i][0]} | SMTP: ${smtpIdx}`, "green");
                        batchCount++;
                    } else throw new Error(r.error);
                } catch (e) {
                    $('stat-fail').innerText = parseInt($('stat-fail').innerText)+1;
                    addAnalysis("FAIL", e.message, "red");
                }
                await new Promise(r => setTimeout(r, parseInt($('send-delay').value)));
            }
            stopBlast();
        }

        function stopBlast() { isRunning = false; $('btn-start').classList.remove('hidden'); $('btn-stop').classList.add('hidden'); }
        function saveAll() {
            const d = {};
            document.querySelectorAll('.save-data').forEach(el => d[el.id] = el.type === 'checkbox' ? el.checked : el.value);
            localStorage.setItem('p7m_ultra_v7', JSON.stringify(d));
        }

        window.onload = () => {
            const cache = localStorage.getItem('p7m_ultra_v7');
            if(cache) {
                const d = JSON.parse(cache);
                Object.keys(d).forEach(k => { if($(k)) { if($(k).type === 'checkbox') $(k).checked = d[k]; else $(k).value = d[k]; } });
                updatePreview();
                toggleBatch();
            }
        };
    </script>
</body>
</html>
