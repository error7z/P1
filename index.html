<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P7M ULTRA | INFINITY MATRIX</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=Space+Mono&display=swap" rel="stylesheet">
    <style>
        :root { --rb: linear-gradient(45deg, #ff0000, #ff7300, #fffb00, #48ff00, #00ffd5, #002bff, #7a00ff, #ff00c8, #ff0000); }
        body { background: #020305; color: #e2e8f0; font-family: 'Plus Jakarta Sans', sans-serif; font-size: 11px; }
        .border-panel { border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 15px; background: rgba(10,12,18,0.5); }
        .premium-border { position: relative; padding: 1px; background: var(--rb); background-size: 400%; border-radius: 13px; animation: flow 20s linear infinite; }
        @keyframes flow { 0% { background-position: 0% 50%; } 100% { background-position: 100% 50%; } }
        .glass { backdrop-filter: blur(40px); background: rgba(15,17,26,0.95); }
        .input-p7m { background: #080a0f; border: 1px solid #1e293b; color: #fff; padding: 10px; border-radius: 8px; width: 100%; outline: none; transition: 0.3s; }
        .input-p7m:focus { border-color: #3b82f6; box-shadow: 0 0 10px rgba(59,130,246,0.3); }
        .floating-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; z-index: 100; }
        .analysis-card { border-left: 4px solid; padding: 10px; margin-bottom: 8px; background: rgba(255,255,255,0.03); animation: slide 0.2s ease; }
        @keyframes slide { from { opacity: 0; transform: translateX(10px); } }
        .attach-badge { background: #1e293b; border: 1px solid #3b82f6; padding: 5px 10px; border-radius: 6px; font-weight: bold; }
        .custom-scroll::-webkit-scrollbar { width: 3px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="p-4">

    <div id="settings-modal" class="floating-modal" onclick="this.style.display='none'">
        <div class="glass border-panel w-[600px] p-6 space-y-4" onclick="event.stopPropagation()">
            <div class="flex justify-between border-b border-white/10 pb-2">
                <h2 id="modal-title" class="text-blue-400 font-black uppercase text-xs">Rotator Configuration</h2>
                <button onclick="$('settings-modal').style.display='none'" class="text-zinc-500">✕</button>
            </div>
            <textarea id="modal-input" class="input-p7m h-48 font-mono" placeholder="Paste manual strings here (One per line)..."></textarea>
            <div class="flex items-center gap-4">
                <span class="text-[10px] text-zinc-500 font-bold uppercase">Upload TXT/CSV</span>
                <input type="file" id="modal-file" accept=".txt,.csv" class="text-[10px]">
            </div>
            <button onclick="saveModalData()" class="w-full bg-blue-600 py-3 rounded font-black uppercase text-xs">Save Matrix</button>
        </div>
    </div>

    <div class="max-w-[1900px] mx-auto grid grid-cols-12 gap-4">
        
        <div class="col-span-3 space-y-4">
            <h1 class="text-2xl font-black italic">P7M <span class="text-blue-500">ULTRA</span></h1>
            <button onclick="$('identity-modal').style.display='flex'" class="w-full bg-zinc-800 border border-white/10 py-3 rounded-xl text-[10px] font-black uppercase hover:bg-purple-600">⚙️ Identity Setting</button>

            <div class="premium-border">
                <div class="border-panel glass space-y-3">
                    <p class="text-[10px] font-black text-blue-400 uppercase">Proxy Tunneling</p>
                    <div class="grid grid-cols-2 gap-2">
                        <input type="text" id="px-host" placeholder="Host" class="input-p7m save-data">
                        <input type="text" id="px-port" placeholder="Port" class="input-p7m save-data">
                        <input type="text" id="px-user" placeholder="User" class="input-p7m save-data">
                        <input type="password" id="px-pass" placeholder="Pass" class="input-p7m save-data">
                    </div>
                    <button onclick="connectProxy()" class="w-full bg-blue-600 py-2 rounded text-[10px] font-bold uppercase">Connect to Server Proxy</button>
                    <div id="px-status" class="text-[9px] text-zinc-500 italic px-1">Standby...</div>
                </div>
            </div>

            <div class="border-panel space-y-3">
                <p class="text-[10px] font-black text-orange-400 uppercase">Strategy</p>
                <div class="space-y-2">
                    <select id="strategy" class="input-p7m save-data" onchange="toggleBatch()">
                        <option value="1-by-1">1-BY-1 (Sequential)</option>
                        <option value="random">Random (Chaos)</option>
                        <option value="continuous">Continuous (Batch)</option>
                    </select>
                    <div id="batch-container" class="hidden flex justify-between items-center bg-zinc-900 p-2 rounded">
                        <label>Jump Count</label><input type="number" id="smtp-jump" value="5" class="input-p7m !w-16">
                    </div>
                    <div class="flex justify-between items-center"><label>Delay (ms)</label><input type="number" id="send-delay" value="3000" class="input-p7m !w-20 save-data"></div>
                </div>
            </div>

            <div class="border-panel border-b-4 border-blue-500 text-center">
                <div class="grid grid-cols-2 gap-2 mb-4">
                    <div class="bg-zinc-900 p-4 rounded-xl text-green-500 font-black"><span class="text-[9px] text-zinc-500 uppercase">Sent</span><p id="stat-sent" class="text-3xl">0</p></div>
                    <div class="bg-zinc-900 p-4 rounded-xl text-red-500 font-black"><span class="text-[9px] text-zinc-500 uppercase">Fail</span><p id="stat-fail" class="text-3xl">0</p></div>
                </div>
                <button onclick="startBlast()" id="btn-start" class="w-full bg-blue-600 py-4 rounded-xl font-black uppercase text-xs">Execute Blast</button>
                <button onclick="stopBlast()" id="btn-stop" class="w-full bg-red-600 py-4 rounded-xl font-black uppercase text-xs hidden">Stop Engine</button>
            </div>
        </div>

        <div class="col-span-6 space-y-4">
            <div class="grid grid-cols-2 gap-4">
                <div class="border-panel">
                    <div class="flex justify-between"><span class="text-blue-400 font-bold uppercase">SMTP (<b id="count-smtp">0</b>)</span><input type="file" id="f-smtp" multiple class="text-[10px] w-24"></div>
                    <p id="name-smtp" class="text-[9px] text-zinc-500 truncate mt-1">Ready...</p>
                </div>
                <div class="border-panel">
                    <div class="flex justify-between"><span class="text-green-400 font-bold uppercase">Targets (<b id="count-target">0</b>)</span><input type="file" id="f-target" multiple class="text-[10px] w-24"></div>
                    <p id="name-target" class="text-[9px] text-zinc-500 truncate mt-1">Ready...</p>
                </div>
            </div>

            <div class="premium-border">
                <div class="border-panel glass space-y-4">
                    <div class="grid grid-cols-2 gap-4">
                        <div class="relative">
                            <div class="flex justify-between mb-1"><label>Sender Name</label><input type="checkbox" id="ai-sender" class="save-data"></div>
                            <input type="text" id="s-name" placeholder="Manual Name" class="input-p7m pr-10">
                            <button onclick="openSettings('sender')" class="absolute right-2 bottom-2">⚙️</button>
                        </div>
                        <div class="relative">
                            <div class="flex justify-between mb-1"><label>Subject</label><input type="checkbox" id="ai-subject" class="save-data"></div>
                            <input type="text" id="s-sub" placeholder="Manual Subject" class="input-p7m pr-10">
                            <button onclick="openSettings('subject')" class="absolute right-2 bottom-2">⚙️</button>
                        </div>
                    </div>

                    <div class="bg-blue-600/5 p-4 rounded-xl">
                        <div class="flex gap-2 items-center mb-2">
                            <button class="bg-zinc-800 px-4 py-2 rounded text-[10px] font-bold border border-white/10 relative">ATTACH<input type="file" id="f-attach" multiple class="opacity-0 absolute inset-0"></button>
                            <div id="attach-preview" class="flex gap-2 overflow-x-auto"></div>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <textarea id="s-body" oninput="updatePreview()" class="input-p7m h-[380px] font-mono text-[10px] save-data" placeholder="HTML Body..."></textarea>
                        <div class="bg-white rounded overflow-hidden h-[380px]"><iframe id="p-frame" class="w-full h-full border-0"></iframe></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-span-3 flex flex-col h-full border-panel glass overflow-hidden">
            <div class="flex justify-between items-center border-b border-white/10 pb-2 mb-2">
                <span class="text-[10px] font-black uppercase text-zinc-500">Monitor Analysis</span>
                <button onclick="clearAll()" class="text-red-500 font-bold text-[9px]">CLEAR ALL</button>
            </div>
            <div id="analysis-box" class="flex-grow overflow-y-auto custom-scroll space-y-2"></div>
        </div>
    </div>

    <script>
        let smtps = [], targets = [], attachments = [], isRunning = false, activeType = '';
        const $ = (id) => document.getElementById(id);

        function addLog(type, msg, color) {
            const div = document.createElement('div');
            div.className = `analysis-card border-${color}-500`;
            div.style.borderColor = color;
            div.innerHTML = `<div class="flex justify-between font-black uppercase text-[8px]"><span>${type}</span><span class="opacity-30">${new Date().toLocaleTimeString()}</span></div><div class="mt-1">${msg}</div>`;
            $('analysis-box').prepend(div);
        }

        async function connectProxy() {
            addLog("PROXY", "Requesting server-side config...", "#3b82f6");
            try {
                const res = await fetch('/api/proxy-config');
                const r = await res.json();
                if(r.success) {
                    addLog("PROXY", "proxyConfig.js loaded successfully", "#22c55e");
                    $('px-status').innerText = "Connected to Server Config";
                }
            } catch (e) { addLog("PROXY", "Failed to reach server file", "#ef4444"); }
        }

        // --- FIXED SETTINGS LOGIC ---
        function openSettings(type) {
            activeType = type;
            $('settings-modal').style.display = 'flex';
            $('modal-title').innerText = `${type.toUpperCase()} CONFIGURATION`;
            $('modal-input').value = localStorage.getItem(`p7m_list_${type}`) || "";
        }

        function saveModalData() {
            localStorage.setItem(`p7m_list_${activeType}`, $('modal-input').value);
            addLog("SYNC", `${activeType.toUpperCase()} matrix locked`, "#a855f7");
            $('settings-modal').style.display = 'none';
        }

        $('modal-file').onchange = (e) => {
            const reader = new FileReader();
            reader.onload = () => {
                $('modal-input').value = reader.result;
                addLog("UPLOAD", `${e.target.files[0].name} imported to rotator`, "#22c55e");
            };
            reader.readAsText(e.target.files[0]);
        };

        // --- MULTI-FILE LOADING ---
        function parseFiles(e, listRef, countId, nameId) {
            Array.from(e.target.files).forEach(f => {
                Papa.parse(f, { skipEmptyLines: true, complete: r => {
                    const rows = r.data.filter(x => x.length > 0);
                    rows.forEach(row => listRef.push(row));
                    $(countId).innerText = listRef.length;
                    $(nameId).innerText = f.name + ` (+${rows.length})`;
                    addLog("DATA", `Imported ${rows.length} from ${f.name}`, "#22c55e");
                }});
            });
        }

        $('f-smtp').onchange = e => parseFiles(e, smtps, 'count-smtp', 'name-smtp');
        $('f-target').onchange = e => parseFiles(e, targets, 'count-target', 'name-target');

        $('f-attach').onchange = e => {
            Array.from(e.target.files).forEach(f => {
                const reader = new FileReader();
                reader.onload = () => {
                    attachments.push({ filename: f.name, content: reader.result.split(',')[1], encoding: 'base64' });
                    $('attach-preview').innerHTML += `<div class="attach-badge">📎 ${f.name}</div>`;
                    addLog("ATTACH", `${f.name} ready for injection`, "#3b82f6");
                };
                reader.readAsDataURL(f);
            });
        };

        async function startBlast() {
            if(!smtps.length || !targets.length) return alert("LOAD STACKS");
            isRunning = true;
            $('btn-start').classList.add('hidden'); $('btn-stop').classList.remove('hidden');
            addLog("CORE", "Blasting Sequence Initialized", "#f97316");

            const names = localStorage.getItem('p7m_list_sender')?.split('\n').filter(x => x.trim()) || [];
            const subs = localStorage.getItem('p7m_list_subject')?.split('\n').filter(x => x.trim()) || [];

            for(let i=0; i<targets.length; i++) {
                if(!isRunning) break;

                const name = ($('ai-sender').checked && names.length) ? names[Math.floor(Math.random()*names.length)] : $('s-name').value;
                const sub = ($('ai-subject').checked && subs.length) ? subs[Math.floor(Math.random()*subs.length)] : $('s-sub').value;

                const payload = {
                    smtp: { user: smtps[i % smtps.length][0], pass: smtps[i % smtps.length][1] },
                    proxy: { host: $('px-host').value, port: $('px-port').value, user: $('px-user').value, pass: $('px-pass').value },
                    mail: { to: targets[i][0], fromName: name, subject: sub, html: $('s-body').value },
                    headers: { userAgent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36", priority: "1", mailer: "Outlook 16.0" },
                    encoding: "7bit", attachments
                };

                try {
                    const res = await fetch('/api/send', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(payload) });
                    const r = await res.json();
                    if(r.success) {
                        $('stat-sent').innerText = parseInt($('stat-sent').innerText)+1;
                        addLog("PASS", `${targets[i][0]} accepted via SMTP[${i % smtps.length}]`, "#22c55e");
                    } else throw r;
                } catch (e) {
                    $('stat-fail').innerText = parseInt($('stat-fail').innerText)+1;
                    addLog("FAIL", `${targets[i][0]} Rejected: ${e.error || "Timeout"}`, "#ef4444");
                }
                await new Promise(r => setTimeout(r, parseInt($('send-delay').value)));
            }
            stopBlast();
        }

        function clearAll() {
            smtps = []; targets = []; attachments = [];
            $('count-smtp').innerText = '0'; $('count-target').innerText = '0';
            $('name-smtp').innerText = 'Ready...'; $('name-target').innerText = 'Ready...';
            $('attach-preview').innerHTML = '';
            $('analysis-box').innerHTML = '';
            addLog("WIPE", "All data stacks cleared", "#ef4444");
        }

        function stopBlast() { isRunning = false; $('btn-start').classList.remove('hidden'); $('btn-stop').classList.add('hidden'); addLog("STOP", "Sequence Terminated", "#ef4444"); }
        function updatePreview() { $('p-frame').srcdoc = `<html><body>${$('s-body').value}</body></html>`; }
        function toggleBatch() { $('batch-container').style.display = ($('strategy').value === 'continuous') ? 'flex' : 'none'; }
    </script>
</body>
</html>
