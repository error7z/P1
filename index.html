<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P7M ULTRA | Global Node Matrix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --rb: linear-gradient(45deg, #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #4b0082, #8b00ff); }
        body { background-color: #030406; color: #f1f5f9; font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden; }
        .premium-border { position: relative; padding: 1px; background: var(--rb); background-size: 300% 300%; animation: rb-move 4s linear infinite; border-radius: 16px; }
        @keyframes rb-move { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        .glass-card { background: rgba(10, 11, 16, 0.98); backdrop-filter: blur(20px); border-radius: 15px; border: 1px solid rgba(255,255,255,0.03); }
        .input-glow { background: #08090d; border: 1px solid #1e293b; color: #fff; padding: 10px; border-radius: 8px; outline: none; transition: 0.3s; width: 100%; font-size: 12px; }
        .input-glow:focus { border-color: #3b82f6; box-shadow: 0 0 15px rgba(59, 130, 246, 0.1); }
        .btn-action { transition: 0.2s; cursor: pointer; }
        .btn-action:hover { opacity: 0.8; transform: translateY(-1px); }
        #log-container { height: 500px; overflow-y: auto; }
        .custom-scroll::-webkit-scrollbar { width: 3px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #1e293b; }
        .hidden { display: none; }
        .fail-detail { font-size: 7px; color: #64748b; display: block; line-height: 1.2; margin-top: 2px; font-family: monospace; }
        .node-success { color: #22c55e; text-shadow: 0 0 10px rgba(34, 197, 94, 0.2); }
    </style>
</head>
<body class="p-4">
    <div class="max-w-[1900px] mx-auto grid grid-cols-12 gap-6">
        <div class="col-span-3 space-y-4">
            <div class="flex items-center justify-between mb-2">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center shadow-lg"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"></path></svg></div>
                    <h1 class="text-xl font-black tracking-tighter uppercase">P7M <span class="text-blue-500">ULTRA</span></h1>
                </div>
                <button onclick="toggleSettings()" class="text-xl hover:rotate-90 transition-transform">⚙️</button>
            </div>

            <div id="settings-panel" class="hidden premium-border">
                <div class="glass-card p-4 space-y-2">
                    <p class="text-[10px] font-black text-blue-400 uppercase">Identity Override</p>
                    <input type="text" id="m-ua" placeholder="Manual User-Agent" class="input-glow text-[10px] save-data">
                    <input type="text" id="m-msgid" placeholder="Manual Message-ID" class="input-glow text-[10px] save-data">
                </div>
            </div>

            <div class="premium-border">
                <div class="glass-card p-4 space-y-3">
                    <p class="text-[10px] font-black text-blue-400 uppercase tracking-widest">Intelligence Hub (Proxy)</p>
                    <button onclick="connectProxyTunnel()" class="w-full bg-blue-600 py-2 rounded text-[10px] font-bold uppercase btn-action">Connect & Deep Scan</button>
                    <div id="ip-details" class="bg-black/50 p-3 rounded-lg text-[10px] font-mono space-y-1 min-h-[80px]">
                        <p class="text-zinc-500 italic">Analysis Standby...</p>
                    </div>
                </div>
            </div>

            <div class="premium-border">
                <div class="glass-card p-4 space-y-3">
                    <div class="flex justify-between items-center">
                        <p class="text-[10px] font-black text-purple-400 uppercase tracking-widest">Global Node Stack</p>
                        <b id="count-server" class="text-white text-[10px]">0</b>
                    </div>
                    <input type="file" id="f-server" accept=".csv" class="text-[10px] w-full text-zinc-500">
                    <div id="node-health" class="grid grid-cols-10 gap-1 mt-2"></div>
                </div>
            </div>

            <div class="premium-border">
                <div class="glass-card p-4 space-y-3">
                    <p class="text-[10px] font-black text-orange-400 uppercase tracking-widest">Protocol Strategy</p>
                    <select id="rotation-mode" class="input-glow save-data" onchange="toggleBatchInput()">
                        <option value="1-by-1">1-BY-1 (Sequential)</option>
                        <option value="random">Random (Chaos Mode)</option>
                    </select>
                    <input type="number" id="send-delay" placeholder="Delay Time (MS)" value="3000" class="input-glow save-data">
                </div>
            </div>

            <div class="glass-card p-5 border-b-4 border-blue-600">
                <div class="grid grid-cols-2 gap-3 mb-4">
                    <div class="bg-zinc-900 p-3 rounded-xl text-center"><span class="text-[9px] text-zinc-500 uppercase font-bold">Inbox</span><p id="v-sent" class="text-3xl font-black text-green-500">0</p></div>
                    <div class="bg-zinc-900 p-3 rounded-xl text-center"><span class="text-[9px] text-zinc-500 uppercase font-bold">Block</span><p id="v-fail" class="text-3xl font-black text-red-500">0</p></div>
                </div>
                <button onclick="launch()" id="btn-start" class="w-full bg-blue-600 py-4 rounded-xl font-black text-xs uppercase tracking-widest btn-action">Initiate Global Blast</button>
                <button onclick="forceStop()" id="btn-stop" class="w-full bg-red-900/20 text-red-500 border border-red-500/50 py-4 rounded-xl font-black text-xs uppercase hidden">Emergency Stop</button>
            </div>
        </div>

        <div class="col-span-6 space-y-4">
            <div class="grid grid-cols-2 gap-4">
                <div class="premium-border"><div class="glass-card p-4">
                    <div class="flex justify-between mb-2"><span class="text-[10px] font-bold text-zinc-400 uppercase">SMTP Stack: <b id="count-smtp" class="text-blue-500">0</b></span><button onclick="clearData('smtps')" class="text-[9px] text-red-500 font-bold uppercase">Clear</button></div>
                    <input type="file" id="f-smtp" accept=".csv" class="text-[10px] w-full text-zinc-500">
                </div></div>
                <div class="premium-border"><div class="glass-card p-4">
                    <div class="flex justify-between mb-2"><span class="text-[10px] font-bold text-zinc-400 uppercase">Targets: <b id="count-target" class="text-green-500">0</b></span><button onclick="clearData('targets')" class="text-[9px] text-red-500 font-bold uppercase">Clear</button></div>
                    <input type="file" id="f-target" accept=".csv" class="text-[10px] w-full text-zinc-500">
                </div></div>
            </div>

            <div class="premium-border">
                <div class="glass-card p-5 space-y-4">
                    <div class="grid grid-cols-2 gap-3">
                        <input type="text" id="s-name" placeholder="Sender Name" class="input-glow save-data">
                        <input type="text" id="s-sub" placeholder="Subject Line" class="input-glow save-data">
                    </div>
                    <textarea id="s-body" oninput="updatePreview()" class="input-glow font-mono text-[10px] h-[400px] custom-scroll save-data" placeholder="HTML Payload..."></textarea>
                    <div class="bg-white rounded-lg overflow-hidden h-[200px] border border-zinc-800"><iframe id="p-frame" class="w-full h-full border-0"></iframe></div>
                </div>
            </div>
        </div>

        <div class="col-span-3">
            <div class="glass-card h-full flex flex-col">
                <div class="p-4 border-b border-white/5 flex justify-between items-center bg-zinc-950/50">
                    <h3 class="text-[10px] font-black text-zinc-400 tracking-[2px] uppercase">Quantum Diagnostics</h3>
                    <button onclick="document.getElementById('log').innerHTML=''" class="text-[9px] text-red-500 font-bold hover:underline">Clear</button>
                </div>
                <div id="log-container" class="p-4 custom-scroll">
                    <div id="log" class="space-y-3 font-mono text-[9px]"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let smtps = [], targets = [], servers = [], sent = 0, fail = 0, isRunning = false;
        let smtpPointer = 0, serverPointer = 0;

        function toggleSettings() { document.getElementById('settings-panel').classList.toggle('hidden'); }

        async function connectProxyTunnel() {
            const display = document.getElementById('ip-details');
            display.innerHTML = '<span class="animate-pulse text-blue-400 font-bold uppercase">DEEP SCANNING TUNNEL...</span>';
            try {
                const res = await fetch('/api/proxy-info');
                const data = await res.json();
                if(data.success) {
                    const fColor = data.fraudScore > 50 ? 'text-red-500' : 'text-green-500';
                    display.innerHTML = `
                        <div class="text-white">IP: ${data.ip}</div>
                        <div class="text-zinc-500">ISP: ${data.isp}</div>
                        <div class="${fColor} font-bold">FRAUD SCORE: ${data.fraudScore}</div>
                        <div class="text-orange-400">ABUSE: ${data.abuseScore}%</div>
                        <div class="text-blue-400 text-[8px]">STATUS: TUNNEL ACTIVE</div>
                    `;
                }
            } catch (e) { display.innerHTML = '<span class="text-red-500">TUNNEL_ERR: OFFLINE</span>'; }
        }

        function assemblePayloadString() {
            const html = document.getElementById('s-body').value;
            const mutation = `m-${Math.random().toString(36).substring(2,5)}`;
            const dna = Math.random().toString(36).substring(7).toUpperCase();
            return `<style>.${mutation}{display:none;}</style><div>${html}</div><div class="${mutation}">DNA:${dna}</div>`;
        }

        async function sendMail(target, smtp) {
            const payload = {
                smtpConfig: { user: smtp[0], pass: smtp[1], host: 'smtp.gmail.com' },
                mailData: { to: target[0], fromName: document.getElementById('s-name').value, subject: document.getElementById('s-sub').value, html: assemblePayloadString() },
                manualHeaders: {
                    userAgent: document.getElementById('m-ua').value,
                    msgId: document.getElementById('m-msgid').value
                }
            };

            const nodeId = serverPointer % (servers.length || 1);
            try {
                const res = await fetch('/api/send', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(payload) });
                const result = await res.json();
                if(result.success) {
                    sent++;
                    if(servers.length) document.getElementById(`node-${nodeId}`).className = "w-1.5 h-1.5 bg-green-500 shadow-[0_0_5px_#22c55e]";
                    addLog(`SUCCESS → ${target[0]}`, "node-success");
                } else { throw new Error(result.error); }
            } catch (err) {
                fail++;
                if(servers.length) document.getElementById(`node-${nodeId}`).className = "w-1.5 h-1.5 bg-red-600 shadow-[0_0_5px_red]";
                addLog(`BLOCK → ${target[0]}`, "text-red-500", err.message);
            }
            updateStats();
        }

        async function launch() {
            if(!smtps.length || !targets.length) return alert("LOAD DATABASES");
            isRunning = true; toggleUI(true);
            for(let i=0; i < targets.length; i++) {
                if(!isRunning) break;
                await sendMail(targets[i], smtps[smtpPointer % smtps.length]);
                smtpPointer++; serverPointer++;
                await new Promise(r => setTimeout(r, parseInt(document.getElementById('send-delay').value)));
            }
            isRunning = false; toggleUI(false);
        }

        // --- CORE UTILITIES ---
        document.getElementById('f-smtp').onchange = e => handleCSV(e, 'smtp');
        document.getElementById('f-target').onchange = e => handleCSV(e, 'target');
        document.getElementById('f-server').onchange = e => handleCSV(e, 'server');

        function handleCSV(e, type) {
            Papa.parse(e.target.files[0], { skipEmptyLines: true, complete: r => {
                const newData = r.data.filter(row => row.length > 0);
                if(type === 'smtp') { smtps = newData; document.getElementById('count-smtp').innerText = smtps.length; }
                else if(type === 'target') { targets = newData; document.getElementById('count-target').innerText = targets.length; }
                else if(type === 'server') { servers = newData; document.getElementById('count-server').innerText = servers.length; initHealthGrid(servers.length); }
                addLog(`SYSTEM: ${type.toUpperCase()} LOADED`, "text-blue-400");
            }});
        }

        function initHealthGrid(count) {
            const container = document.getElementById('node-health'); container.innerHTML = '';
            for(let i=0; i<count; i++) {
                const dot = document.createElement('div'); dot.id = `node-${i}`; dot.className = "w-1.5 h-1.5 bg-zinc-800 rounded-full";
                container.appendChild(dot);
            }
        }

        function updatePreview() { document.getElementById('p-frame').srcdoc = assemblePayloadString(); saveAllData(); }
        function forceStop() { isRunning = false; toggleUI(false); }
        function toggleUI(r) { document.getElementById('btn-start').classList.toggle('hidden', r); document.getElementById('btn-stop').classList.toggle('hidden', !r); }
        function updateStats() { document.getElementById('v-sent').innerText = sent; document.getElementById('v-fail').innerText = fail; }
        function addLog(msg, color, detail = "") {
            const entry = document.createElement('div');
            entry.className = "border-b border-white/5 pb-2";
            entry.innerHTML = `<span class="${color} font-bold">[${new Date().toLocaleTimeString()}] ${msg}</span>${detail ? `<span class="fail-detail">${detail}</span>` : ''}`;
            document.getElementById('log').prepend(entry);
        }
        function saveAllData() { const d = {}; document.querySelectorAll('.save-data').forEach(e => d[e.id] = e.value); localStorage.setItem('p7m_ultra_v6', JSON.stringify(d)); }
        function clearData(t) { if(t==='smtps') smtps=[]; else targets=[]; updateStats(); }
        window.onload = () => { const s = localStorage.getItem('p7m_ultra_v6'); if(s) { const d = JSON.parse(s); Object.keys(d).forEach(k => { if(document.getElementById(k)) document.getElementById(k).value = d[k]; }); updatePreview(); } };
    </script>
</body>
</html>
