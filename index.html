<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P7M ULTRA | INFINITY MATRIX</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=Space+Mono&display=swap" rel="stylesheet">
    <style>
        :root { --rb: linear-gradient(45deg, #ff0000, #ff7300, #fffb00, #48ff00, #00ffd5, #002bff, #7a00ff, #ff00c8, #ff0000); }
        body { background: #020305; color: #e2e8f0; font-family: 'Plus Jakarta Sans', sans-serif; font-size: 11px; }
        .border-panel { border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 15px; background: rgba(10,12,18,0.5); }
        .premium-border { position: relative; padding: 1px; background: var(--rb); background-size: 400%; border-radius: 13px; animation: flow 20s linear infinite; }
        @keyframes flow { 0% { background-position: 0% 50%; } 100% { background-position: 100% 50%; } }
        .glass { backdrop-filter: blur(40px); background: rgba(15,17,26,0.95); }
        .input-p7m { background: #080a0f; border: 1px solid #1e293b; color: #fff; padding: 10px; border-radius: 8px; width: 100%; outline: none; }
        .floating-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; z-index: 100; }
        .analysis-card { border-left: 4px solid; padding: 10px; margin-bottom: 8px; background: rgba(255,255,255,0.03); }
        .custom-scroll::-webkit-scrollbar { width: 3px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="p-4">

    <div id="settings-modal" class="floating-modal" onclick="this.style.display='none'">
        <div class="glass border-panel w-[600px] p-6 space-y-4" onclick="event.stopPropagation()">
            <h2 id="modal-title" class="text-blue-400 font-black uppercase text-xs border-b border-white/10 pb-2">Configuration</h2>
            <textarea id="modal-input" class="input-p7m h-48 font-mono" placeholder="Paste list here (one per line)..."></textarea>
            <button onclick="saveModalData()" class="w-full bg-blue-600 py-3 rounded font-black uppercase text-xs">Save Matrix</button>
        </div>
    </div>

    <div id="identity-modal" class="floating-modal" onclick="this.style.display='none'">
        <div class="glass border-panel w-[700px] p-6 space-y-4" onclick="event.stopPropagation()">
            <h2 class="text-purple-400 font-black uppercase text-xs border-b border-white/10 pb-2">Global Identity Settings</h2>
            <div class="grid grid-cols-2 gap-4 max-h-[400px] overflow-y-auto pr-2 custom-scroll">
                <div class="space-y-1">
                    <div class="flex justify-between"><label>USER-AGENT</label><input type="checkbox" id="auto-ua" checked></div>
                    <input type="text" id="h-ua" class="input-p7m" placeholder="Mozilla/5.0...">
                </div>
                <div class="space-y-1">
                    <div class="flex justify-between"><label>MESSAGE-ID</label><input type="checkbox" id="auto-mid" checked></div>
                    <input type="text" id="h-mid" class="input-p7m">
                </div>
                <div class="space-y-1">
                    <div class="flex justify-between"><label>GMAIL-THREAD</label><input type="checkbox" id="auto-tid" checked></div>
                    <input type="text" id="h-tid" class="input-p7m">
                </div>
                <div class="space-y-1">
                    <div class="flex justify-between"><label>X-MAILER</label><input type="checkbox" id="auto-mailer" checked></div>
                    <input type="text" id="h-mailer" class="input-p7m" value="Microsoft Outlook 16.0">
                </div>
                <div class="space-y-1"><label>X-PRIORITY</label><input type="text" id="h-priority" class="input-p7m" value="1 (Highest)"></div>
                <div class="space-y-1"><label>X-MS-PRIORITY</label><input type="text" id="h-mspriority" class="input-p7m" value="High"></div>
            </div>
            <button onclick="$('identity-modal').style.display='none'" class="w-full bg-purple-600 py-3 rounded font-black uppercase text-xs">Save Matrix</button>
        </div>
    </div>

    <div class="max-w-[1900px] mx-auto grid grid-cols-12 gap-4">
        
        <div class="col-span-3 space-y-4">
            <h1 class="text-2xl font-black italic">P7M <span class="text-blue-500">ULTRA</span></h1>
            <button onclick="$('identity-modal').style.display='flex'" class="w-full bg-zinc-800 border border-white/10 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest hover:bg-purple-600 transition">⚙️ Identity Setting</button>
            
            <div class="premium-border">
                <div class="border-panel glass space-y-3">
                    <p class="text-[10px] font-black text-blue-400 uppercase">Proxy Tunneling</p>
                    <button id="btn-proxy-connect" onclick="connectProxy()" class="w-full bg-blue-600 py-3 rounded-xl font-black uppercase text-[10px] tracking-widest">Connect IP</button>
                    <div id="px-status" class="text-center text-[9px] text-zinc-500 uppercase font-bold">Status: Disconnected</div>
                </div>
            </div>

            <div class="border-panel space-y-3">
                <p class="text-[10px] font-black text-orange-400 uppercase">Blast Strategy</p>
                <div class="space-y-2">
                    <select id="strategy" class="input-p7m" onchange="toggleBatch()">
                        <option value="1-by-1">1-BY-1 (Sequential)</option>
                        <option value="random">Random (Chaos Mode)</option>
                        <option value="continuous">Continuously Send (Batch)</option>
                    </select>
                    <div id="batch-container" class="hidden flex justify-between items-center bg-zinc-900/50 p-2 rounded">
                        <label class="text-[10px]">Jump after</label>
                        <input type="number" id="smtp-jump" value="5" class="input-p7m !w-16">
                    </div>
                    <div class="flex justify-between items-center">
                        <label class="text-[10px]">Delay (ms)</label>
                        <input type="number" id="send-delay" value="3000" class="input-p7m !w-20">
                    </div>
                </div>
            </div>

            <div class="border-panel border-b-4 border-blue-500 text-center">
                <div class="grid grid-cols-2 gap-2 mb-4">
                    <div class="bg-zinc-900 p-4 rounded-xl text-green-500"><span class="text-[9px] text-zinc-500 uppercase">Sent</span><p id="stat-sent" class="text-3xl font-black">0</p></div>
                    <div class="bg-zinc-900 p-4 rounded-xl text-red-500"><span class="text-[9px] text-zinc-500 uppercase">Fail</span><p id="stat-fail" class="text-3xl font-black">0</p></div>
                </div>
                <button onclick="startBlast()" id="btn-start" class="w-full bg-blue-600 py-4 rounded-xl font-black uppercase text-xs">Execute Blast</button>
                <button onclick="stopBlast()" id="btn-stop" class="w-full bg-red-600 py-4 rounded-xl font-black uppercase text-xs hidden">Stop Engine</button>
            </div>
        </div>

        <div class="col-span-6 space-y-4">
            <div class="grid grid-cols-2 gap-4">
                <div class="border-panel">
                    <div class="flex justify-between items-center">
                        <span class="text-blue-400 font-bold uppercase">SMTP (<b id="count-smtp">0</b>)</span>
                        <input type="file" id="f-smtp" multiple class="hidden">
                        <button onclick="$('f-smtp').click()" class="bg-zinc-800 px-2 py-1 rounded text-[9px]">UPLOAD +</button>
                    </div>
                    <div class="flex justify-between items-center mt-2">
                        <p id="name-smtp" class="text-[9px] text-zinc-500 italic truncate">Stacked: None</p>
                        <button onclick="clearStack('smtp')" class="text-red-500 text-[8px] font-bold">CLEAR</button>
                    </div>
                </div>
                <div class="border-panel">
                    <div class="flex justify-between items-center">
                        <span class="text-green-400 font-bold uppercase">Target (<b id="count-target">0</b>)</span>
                        <input type="file" id="f-target" multiple class="hidden">
                        <button onclick="$('f-target').click()" class="bg-zinc-800 px-2 py-1 rounded text-[9px]">UPLOAD +</button>
                    </div>
                    <div class="flex justify-between items-center mt-2">
                        <p id="name-target" class="text-[9px] text-zinc-500 italic truncate">Stacked: None</p>
                        <button onclick="clearStack('target')" class="text-red-500 text-[8px] font-bold">CLEAR</button>
                    </div>
                </div>
            </div>

            <div class="premium-border">
                <div class="border-panel glass space-y-4">
                    <div class="grid grid-cols-2 gap-4">
                        <div class="relative"><div class="flex justify-between mb-1"><label>Sender Name</label><input type="checkbox" id="ai-sender"></div><input type="text" id="s-name" placeholder="Manual Name" class="input-p7m"><button onclick="openSettings('sender')" class="absolute right-2 bottom-2 text-xs">⚙️</button></div>
                        <div class="relative"><div class="flex justify-between mb-1"><label>Subject</label><input type="checkbox" id="ai-subject"></div><input type="text" id="s-sub" placeholder="Manual Subject" class="input-p7m"><button onclick="openSettings('subject')" class="absolute right-2 bottom-2 text-xs">⚙️</button></div>
                    </div>

                    <div class="bg-blue-600/5 p-4 rounded-xl space-y-3">
                        <div class="flex gap-2">
                            <input type="text" id="url-box" placeholder="Button URL" class="input-p7m">
                            <input type="text" id="url-text" placeholder="Button Label" class="input-p7m">
                            <select id="encoding" class="input-p7m !w-32"><option value="7bit">Plain</option><option value="base64">Base64</option></select>
                        </div>
                        <div class="flex items-center gap-3">
                            <button class="bg-zinc-800 px-4 py-2 rounded text-[10px] font-bold border border-white/10 relative">
                                ATTACH <input type="file" id="f-attach" multiple class="opacity-0 absolute inset-0 cursor-pointer">
                            </button>
                            <div id="attach-preview" class="flex gap-2 overflow-x-auto text-[8px] text-blue-400"></div>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div class="space-y-2">
                            <div class="flex justify-between items-center"><label class="text-blue-400 font-bold uppercase">HTML Body</label><div class="flex gap-2">Auto <input type="checkbox" id="auto-html"></div></div>
                            <textarea id="s-body" oninput="updatePreview()" class="input-p7m h-[180px] font-mono text-[9px]" placeholder="HTML Source..."></textarea>
                            <div class="flex justify-between items-center mt-2"><label class="text-green-400 font-bold uppercase">Plain Text</label><div class="flex gap-2">Auto <input type="checkbox" id="auto-text"></div></div>
                            <textarea id="s-text" class="input-p7m h-[120px] font-mono text-[9px]" placeholder="Text Body..."></textarea>
                        </div>
                        <div class="bg-white rounded overflow-hidden h-[340px]"><iframe id="p-frame" class="w-full h-full border-0"></iframe></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-span-3 flex flex-col h-full border-panel glass overflow-hidden">
            <p class="text-[10px] font-black uppercase text-zinc-500 border-b border-white/10 pb-2 mb-2">Analysis Monitor</p>
            <div id="analysis-box" class="flex-grow overflow-y-auto custom-scroll space-y-2"></div>
        </div>
    </div>

    <script>
        let smtps = [], targets = [], attachments = [], isRunning = false, activeType = '', proxyActive = false;
        const $ = (id) => document.getElementById(id);

        function addLog(type, msg, color) {
            const div = document.createElement('div');
            div.className = `analysis-card border-${color}-500`;
            div.style.borderColor = color;
            div.innerHTML = `<div class="flex justify-between font-black uppercase text-[8px]"><span>${type}</span><span class="opacity-30">${new Date().toLocaleTimeString()}</span></div><div class="mt-1">${msg}</div>`;
            $('analysis-box').prepend(div);
        }

        async function connectProxy() {
            addLog("PROXY", "Loading Server Config...", "blue");
            try {
                const res = await fetch('/api/proxy-config');
                const r = await res.json();
                if(r.success) {
                    proxyActive = true;
                    $('px-status').innerText = "Status: Tunnel Active";
                    $('btn-proxy-connect').classList.replace('bg-blue-600', 'bg-green-600');
                    addLog("PROXY", "Config Bridged", "green");
                }
            } catch (e) { addLog("PROXY", "Connection Failed", "red"); }
        }

        function clearStack(type) {
            if(type === 'smtp') { smtps = []; $('count-smtp').innerText = '0'; $('name-smtp').innerText = 'Stacked: None'; }
            else { targets = []; $('count-target').innerText = '0'; $('name-target').innerText = 'Stacked: None'; }
            addLog("WIPE", `${type.toUpperCase()} Stack Cleared`, "red");
        }

        function parseFiles(e, listRef, countId, nameId) {
            Array.from(e.target.files).forEach(f => {
                Papa.parse(f, { skipEmptyLines: true, complete: r => {
                    const rows = r.data.filter(x => x.length > 0);
                    rows.forEach(row => listRef.push(row));
                    $(countId).innerText = listRef.length;
                    $(nameId).innerText = `Stacked: ${f.name} (+${rows.length})`;
                    addLog("UPLOAD", `Added ${rows.length} from ${f.name}`, "green");
                }});
            });
        }

        $('f-smtp').onchange = e => parseFiles(e, smtps, 'count-smtp', 'name-smtp');
        $('f-target').onchange = e => parseFiles(e, targets, 'count-target', 'name-target');

        // FIXED ATTACHMENT UPLOAD LOGIC
        $('f-attach').onchange = e => {
            Array.from(e.target.files).forEach(f => {
                const reader = new FileReader();
                reader.onload = () => {
                    attachments.push({ filename: f.name, content: reader.result.split(',')[1], encoding: 'base64' });
                    $('attach-preview').innerHTML += `<span>📎 ${f.name}</span>`;
                    addLog("ATTACH", `${f.name} queued`, "blue");
                };
                reader.readAsDataURL(f);
            });
        };

        function toggleBatch() {
            $('batch-container').classList.toggle('hidden', $('strategy').value !== 'continuous');
        }

        function openSettings(type) {
            activeType = type;
            $('settings-modal').style.display = 'flex';
            $('modal-title').innerText = `${type.toUpperCase()} ROTATOR`;
            $('modal-input').value = localStorage.getItem(`list_${type}`) || "";
        }

        function saveModalData() {
            localStorage.setItem(`list_${activeType}`, $('modal-input').value);
            $('settings-modal').style.display = 'none';
            addLog("MATRIX", `${activeType.toUpperCase()} updated`, "blue");
        }

        function updatePreview() {
            const btn = $('url-box').value ? `<div style="text-align:center;margin:15px 0;"><a href="${$('url-box').value}" style="background:#2563eb;color:#fff;padding:10px 20px;text-decoration:none;border-radius:5px;">${$('url-text').value || 'Click'}</a></div>` : '';
            $('p-frame').srcdoc = `<html><body>${$('s-body').value}${btn}</body></html>`;
        }

        const rand = (arr) => arr[Math.floor(Math.random() * arr.length)];
        
        async function startBlast() {
            if(!smtps.length || !targets.length) return alert("LOAD STACKS");
            isRunning = true;
            $('btn-start').classList.add('hidden'); $('btn-stop').classList.remove('hidden');
            addLog("CORE", "Engine Initialized", "orange");

            const names = localStorage.getItem('list_sender')?.split('\n').filter(x => x.trim()) || [];
            const subs = localStorage.getItem('list_subject')?.split('\n').filter(x => x.trim()) || [];
            const jumpLimit = parseInt($('smtp-jump').value) || 5;

            for(let i=0; i<targets.length; i++) {
                if(!isRunning) break;

                let smtpIdx = ($('strategy').value === 'continuous') ? Math.floor(i / jumpLimit) % smtps.length : i % smtps.length;

                const payload = {
                    smtp: { user: smtps[smtpIdx][0], pass: smtps[smtpIdx][1] },
                    proxy: { active: proxyActive },
                    mail: { 
                        to: targets[i][0], 
                        fromName: ($('ai-sender').checked && names.length) ? rand(names) : $('s-name').value, 
                        subject: ($('ai-subject').checked && subs.length) ? rand(subs) : $('s-sub').value, 
                        html: $('p-frame').srcdoc, 
                        text: $('s-text').value 
                    },
                    headers: { userAgent: $('h-ua').value || "Mozilla/5.0...", mailer: $('h-mailer').value || "P7M Ultra" },
                    encoding: $('encoding').value, 
                    attachments
                };

                try {
                    const res = await fetch('/api/send', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(payload) });
                    const r = await res.json();
                    if(r.success) {
                        $('stat-sent').innerText = parseInt($('stat-sent').innerText)+1;
                        addLog("PASS", `Target: ${targets[i][0]}`, "green");
                    } else throw r;
                } catch (e) {
                    $('stat-fail').innerText = parseInt($('stat-fail').innerText)+1;
                    addLog("FAIL", `Reject: ${targets[i][0]}`, "red");
                }
                await new Promise(r => setTimeout(r, parseInt($('send-delay').value)));
            }
            stopBlast();
        }

        function stopBlast() { isRunning = false; $('btn-start').classList.remove('hidden'); $('btn-stop').classList.add('hidden'); addLog("STOP", "Engine Halted", "red"); }
    </script>
</body>
</html>
